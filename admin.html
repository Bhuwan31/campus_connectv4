<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Campus Connect</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="home.html" class="logo">
                <div class="logo-icon">🎓</div>
                Campus Connect
            </a>
            <div class="nav-links" id="nav-auth">
                <a href="login.html" class="nav-link">Log In</a>
                <a href="register.html" class="nav-link">Sign Up</a>
            </div>
            <div class="nav-user hidden" id="nav-user">
                <a href="edit_profile.html" style="display: flex; align-items: center; gap: 8px; text-decoration: none;">
                    <img src="uploads/default-avatar.png" class="nav-avatar" id="nav-avatar" alt="Profile">
                    <span class="nav-user-name" id="nav-name"></span>
                </a>
                <button class="btn-logout" onclick="logout()" title="Logout">🚪</button>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <h1 style="margin-bottom: 24px;">🔧 Admin Dashboard</h1>

        <!-- Stats -->
        <div class="admin-section">
            <h2>📊 Platform Statistics</h2>
            <div class="stats-grid" id="admin-stats">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Create Announcement -->
        <div class="admin-section">
            <h2>📢 Create Announcement</h2>
            <div class="alert alert-error" id="admin-alert"></div>

            <form id="announcement-form">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" name="title" class="form-input" placeholder="Announcement title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Content *</label>
                    <textarea name="content" class="form-input" rows="4" placeholder="Announcement content..." required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-input">
                        <option value="low">🟢 Low</option>
                        <option value="normal" selected>🟡 Normal</option>
                        <option value="high">🔴 High</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">📢 Post Announcement</button>
            </form>
        </div>

        <!-- Recent Announcements -->
        <div class="admin-section">
            <h2>📋 Recent Announcements</h2>
            <div id="admin-announcements">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
