<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Campus Connect</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="home.html" class="logo">
                <div class="logo-icon">🎓</div>
                Campus Connect
            </a>
            <div class="nav-links" id="nav-auth">
                <a href="login.html" class="nav-link">Log In</a>
                <a href="register.html" class="nav-link active">Sign Up</a>
            </div>
            <div class="nav-user hidden" id="nav-user">
                <img src="uploads/default-avatar.png" class="nav-avatar" id="nav-avatar" alt="Profile">
                <span class="nav-user-name" id="nav-name"></span>
                <button class="btn-logout" onclick="logout()" title="Logout">🚪</button>
            </div>
        </div>
    </nav>

    <div class="main-container auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>🎓 Campus Connect</h1>
                <p>Create your account</p>
            </div>

            <div class="alert alert-error" id="register-alert"></div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-input" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.edu" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Student ID</label>
                    <input type="text" name="student_id" id="student_id" class="form-input" placeholder="Your student ID number" required>
                    <small style="color: var(--text-secondary); font-size: 12px;">Must be unique - cannot be used by another account</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" class="form-input" placeholder="Repeat password" required>
                </div>

                <!-- Manual Location Picker -->
                <div class="form-group">
                    <label class="form-label">📍 Your Location (Optional)</label>
                    <div class="location-picker">
                        <div class="location-input-wrapper">
                            <span class="icon">🔍</span>
                            <input type="text" 
                                   id="location-input" 
                                   class="location-input" 
                                   placeholder="Type your city (e.g., Kathmandu, New York, Tokyo)..."
                                   data-dropdown="location-dropdown"
                                   autocomplete="off">
                        </div>
                        <div class="location-dropdown" id="location-dropdown"></div>
                        <div id="location-display" style="display: none;"></div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-top: 8px;">
                        <button type="button" id="use-current-location-btn" class="btn-primary" style="padding: 8px 16px; font-size: 13px;" onclick="useCurrentLocation()">
                            📍 Use My Location
                        </button>
                        <small style="color: var(--text-secondary); font-size: 12px; align-self: center;">
                            Used for friend suggestions near you
                        </small>
                    </div>
                </div>

                <button type="submit" class="btn-secondary btn-full">Sign Up</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Initialize location picker on page load
        document.addEventListener('DOMContentLoaded', () => {
            initLocationPicker('location-input', 'location-dropdown', (loc) => {
                console.log('Selected location:', loc);
            });

            // Also init register form
            initRegister();
            initNavbar();
        });
    </script>
</body>
</html>
