<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Campus Connect</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="home.html" class="logo">
                <div class="logo-icon">🎓</div>
                Campus Connect
            </a>
            <div class="nav-links" id="nav-auth">
                <a href="login.html" class="nav-link active">Log In</a>
                <a href="register.html" class="nav-link">Sign Up</a>
            </div>
            <div class="nav-user hidden" id="nav-user">
                <img src="uploads/default-avatar.png" class="nav-avatar" id="nav-avatar" alt="Profile">
                <span class="nav-user-name" id="nav-name"></span>
                <button class="btn-logout" onclick="logout()" title="Logout">🚪</button>
            </div>
        </div>
    </nav>

    <div class="main-container auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>🎓 Campus Connect</h1>
                <p>Connect with your university community</p>
            </div>

            <div class="alert alert-error" id="login-alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Log In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
